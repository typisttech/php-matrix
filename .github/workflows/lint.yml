name: Lint

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actions:
    uses: typisttech/.github/.github/workflows/lint-actions.yml@d7196e1892ee4696e067a314645873982ea6046e # v6.0.1

  php:
    uses: typisttech/.github/.github/workflows/lint-php.yml@d7196e1892ee4696e067a314645873982ea6046e # v6.0.1
    with:
      phpstan: true
      box: true
      box-php-version: '8.5'
      box-version: '4'

  go:
    uses: typisttech/.github/.github/workflows/lint-go.yml@d7196e1892ee4696e067a314645873982ea6046e # v6.0.1
    with:
      golangci-lint: true
      golangci-lint-version-file: .tool-versions

  wait-for-all-lint:
    if: cancelled() || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'failure')
    needs:
      - actions
      - php
      - go
    runs-on: ubuntu-latest
    steps:
      - name: Assert no required jobs were cancelled or failed
        run: exit 1
