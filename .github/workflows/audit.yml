name: Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '26 3 * * *'
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  php:
    uses: typisttech/.github/.github/workflows/audit-php.yml@424ca47b4936481497d05bd7970affa73ec84b74 # v5.4.1

  go:
    uses: typisttech/.github/.github/workflows/audit-go.yml@424ca47b4936481497d05bd7970affa73ec84b74 # v5.4.1
